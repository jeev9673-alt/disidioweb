<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="400" fill="#f7f8fb"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Design Element 1 - Top Left Circle -->
  <circle cx="80" cy="80" r="60" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="80" cy="80" r="40" fill="#fff" opacity="0.3"/>
  
  <!-- Design Element 2 - Bottom Right Circle -->
  <circle cx="420" cy="320" r="70" fill="url(#grad2)" opacity="0.7"/>
  <circle cx="420" cy="320" r="45" fill="#fff" opacity="0.2"/>
  
  <!-- Design Element 3 - Middle Shape -->
  <rect x="150" y="120" width="200" height="160" fill="none" stroke="url(#grad1)" stroke-width="3" rx="20" opacity="0.6"/>
  
  <!-- Design Icons -->
  <!-- Design Icon -->
  <g transform="translate(200, 140)">
    <rect x="-25" y="-25" width="50" height="50" fill="#1f6feb" rx="8" opacity="0.1"/>
    <path d="M -8 -8 L 8 -8 L 8 8 L -8 8 Z" stroke="#1f6feb" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-3" cy="-3" r="2" fill="#1f6feb"/>
    <circle cx="3" cy="3" r="2" fill="#1f6feb"/>
  </g>
  
  <!-- Code Icon -->
  <g transform="translate(280, 180)">
    <rect x="-25" y="-25" width="50" height="50" fill="#3b82f6" rx="8" opacity="0.1"/>
    <path d="M -10 0 L 0 10 L 10 0" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Brand Icon -->
  <g transform="translate(240, 240)">
    <rect x="-25" y="-25" width="50" height="50" fill="#60a5fa" rx="8" opacity="0.1"/>
    <path d="M -5 -8 L 5 -8 L 8 0 L 5 8 L -5 8 L -8 0 Z" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Central Dot Network -->
  <circle cx="250" cy="200" r="4" fill="#1f6feb"/>
  <line x1="250" y1="200" x2="200" y2="150" stroke="#1f6feb" stroke-width="1.5" opacity="0.4"/>
  <line x1="250" y1="200" x2="300" y2="190" stroke="#1f6feb" stroke-width="1.5" opacity="0.4"/>
  <line x1="250" y1="200" x2="240" y2="240" stroke="#1f6feb" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="150" r="2.5" fill="#1f6feb" opacity="0.6"/>
  <circle cx="300" cy="190" r="2.5" fill="#1f6feb" opacity="0.6"/>
  <circle cx="240" cy="240" r="2.5" fill="#1f6feb" opacity="0.6"/>
  
  <!-- Text -->
  <text x="250" y="340" font-size="18" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Creative Solutions
  </text>
  <text x="250" y="365" font-size="14" fill="#6b7280" text-anchor="middle">
    Design • Development • Branding
  </text>
</svg>